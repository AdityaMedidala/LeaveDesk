server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Vue Router uses HTML5 history mode — all routes must fall back to index.html
    # Without this, a page refresh on /employee returns nginx 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (JS/CSS have hashed filenames from Vite)
    location ~* \.(js|css|png|jpg|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
